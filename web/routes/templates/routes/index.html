<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Route Visualizer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  {% load static %}
  <link rel="stylesheet" href="{% static 'routes/style.css' %}">
</head>
<body>
<div class="app-layout">

  <!-- ── SIDEBAR ───────────────────────────────────────── -->
  <aside class="sidebar">

    <header class="sidebar-header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066l-2.084 4.116z"/>
          <path d="M11.374 10.172L9.286 6.056 4.135 16.228h3.066l4.173-8.3 2.088 4.244z"/>
        </svg>
        <div>
          <div class="logo-text">Route Visualizer</div>
          <div class="logo-sub">Powered by Strava</div>
        </div>
      </div>
    </header>

    <!-- Tabs -->
    <div class="input-tabs">
      <button class="tab-btn active" data-tab="route-id">Route ID</button>
      <button class="tab-btn" data-tab="upload">Upload GPX</button>
    </div>

    <!-- Route ID panel -->
    <div class="tab-panel" id="tab-route-id">
      <label for="route-id-input">Strava Route ID</label>
      <input type="text" id="route-id-input"
             placeholder="e.g. 3485649294818578590"
             autocomplete="off" spellcheck="false">
      <button class="btn btn-primary" id="btn-fetch">Load Route</button>
    </div>

    <!-- Upload panel -->
    <div class="tab-panel hidden" id="tab-upload">
      <label>GPX File</label>
      <div class="file-drop-zone" id="drop-zone" role="button" tabindex="0"
           aria-label="Drop GPX file or click to choose">
        <span>Drop .gpx file here or </span>
        <label class="file-choose-label" for="gpx-file-input">choose file</label>
        <input type="file" id="gpx-file-input" accept=".gpx" hidden>
        <span class="file-name" id="chosen-filename"></span>
      </div>
      <button class="btn btn-primary" id="btn-upload">Load File</button>
    </div>

    <!-- Loading -->
    <div class="loading-bar hidden" id="loading-bar">
      <div class="loading-spinner"></div>
      <span id="loading-text">Loading…</span>
    </div>

    <!-- Error -->
    <div class="error-box hidden" id="error-box">
      <span id="error-message"></span>
    </div>

    <div class="divider"></div>

    <!-- Normalize section -->
    <div class="normalize-section hidden" id="normalize-section">
      <button class="btn btn-secondary" id="btn-normalize">Normalize Route</button>
      <p class="normalize-hint">Removes out-and-back detours</p>

      <div class="stats-card hidden" id="stats-card">
        <h3>Normalization Result</h3>
        <div class="stat-row">
          <span class="stat-label">Original points</span>
          <span class="stat-value" id="stat-original">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Clean points</span>
          <span class="stat-value" id="stat-clean">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Detours removed</span>
          <span class="stat-value highlight" id="stat-detours">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Points removed</span>
          <span class="stat-value" id="stat-removed">—</span>
        </div>
      </div>
    </div>

    <!-- Legend / toggles -->
    <div class="legend hidden" id="legend">
      <div class="legend-title">Show on map</div>
      <div class="legend-toggle active hidden" id="toggle-original"
           role="button" tabindex="0" aria-pressed="true">
        <span class="legend-line orange"></span>
        <span>Original route</span>
        <span class="toggle-check">✓</span>
      </div>
      <div class="legend-toggle active hidden" id="toggle-normalized"
           role="button" tabindex="0" aria-pressed="true">
        <span class="legend-line blue"></span>
        <span>Normalized route</span>
        <span class="toggle-check">✓</span>
      </div>
    </div>

  </aside>

  <!-- ── MAP ───────────────────────────────────────────── -->
  <main class="map-container">
    <div id="map"></div>
    <div class="map-empty-state" id="map-empty-state">
      <svg class="map-empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7l6-4 6 4 6-4v14l-6 4-6-4-6 4V7z"/>
        <path d="M9 3v14M15 7v14"/>
      </svg>
      <p>Load a route to see it on the map</p>
    </div>

    <!-- Elevation profile -->
    <div class="elevation-panel hidden" id="elevation-panel">
      <div class="elevation-header">
        <span class="elevation-title">Elevation</span>
        <span class="elevation-gains" id="elevation-gains"></span>
      </div>
      <div class="elevation-chart-wrap">
        <canvas id="elevation-chart"></canvas>
      </div>
    </div>
  </main>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
(function () {
  'use strict';

  // ── State ───────────────────────────────────────────────
  let map, originalLayer, normalizedLayer;
  let currentSource = null;
  let droppedFile = null;
  let currentOrigCoords = null;
  let currentNormCoords = null;
  let elevationChart = null;

  // ── Map init ────────────────────────────────────────────
  map = L.map('map', { zoomControl: true });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(map);
  map.setView([48.0, 10.0], 5);

  // ── DOM refs ────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const loadingBar  = $('loading-bar');
  const loadingText = $('loading-text');
  const errorBox    = $('error-box');
  const errorMsg    = $('error-message');
  const normSection = $('normalize-section');
  const statsCard   = $('stats-card');
  const legend      = $('legend');
  const emptyState  = $('map-empty-state');
  const routeInput  = $('route-id-input');
  const fileInput   = $('gpx-file-input');
  const chosenName  = $('chosen-filename');
  const dropZone    = $('drop-zone');

  // ── UI helpers ──────────────────────────────────────────
  function setLoading(active, msg) {
    loadingText.textContent = msg || 'Loading…';
    loadingBar.classList.toggle('hidden', !active);
    document.querySelectorAll('.btn').forEach(b => { b.disabled = active; });
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorBox.classList.remove('hidden');
  }

  function clearError() { errorBox.classList.add('hidden'); }

  // ── Elevation helpers ────────────────────────────────────
  function haversine2D(a, b) {
    const R = 6371000;
    const φ1 = a[0] * Math.PI / 180, φ2 = b[0] * Math.PI / 180;
    const dφ = φ2 - φ1, dλ = (b[1] - a[1]) * Math.PI / 180;
    const s = Math.sin(dφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(dλ/2)**2;
    return R * 2 * Math.asin(Math.sqrt(s));
  }

  function cumDistancesKm(coords) {
    const d = [0];
    for (let i = 1; i < coords.length; i++) {
      d.push(d[i-1] + haversine2D(coords[i-1], coords[i]) / 1000);
    }
    return d;
  }

  function elevationGainM(coords) {
    let gain = 0;
    for (let i = 1; i < coords.length; i++) {
      const diff = (coords[i][2] || 0) - (coords[i-1][2] || 0);
      if (diff > 0) gain += diff;
    }
    return Math.round(gain);
  }

  function hasElevationData(coords) {
    const eles = coords.map(c => c[2] || 0);
    return Math.max(...eles) - Math.min(...eles) > 1;
  }

  function buildDataset(coords, label, borderColor, bgColor) {
    const dists = cumDistancesKm(coords);
    return {
      label,
      data: coords.map((c, i) => ({ x: +dists[i].toFixed(3), y: +(c[2] || 0) })),
      borderColor,
      backgroundColor: bgColor,
      fill: true,
      borderWidth: 1.5,
      pointRadius: 0,
      tension: 0.3,
    };
  }

  function refreshElevationChart() {
    const panel = $('elevation-panel');
    if (!currentOrigCoords || !hasElevationData(currentOrigCoords)) {
      panel.classList.add('hidden');
      return;
    }
    panel.classList.remove('hidden');

    const hasBoth = !!currentNormCoords;
    const gainEl = $('elevation-gains');
    if (hasBoth) {
      gainEl.innerHTML =
        `<span style="color:#FC4C02">↑ ${elevationGainM(currentOrigCoords).toLocaleString()} m</span>` +
        `&ensp;<span style="color:#2980b9">↑ ${elevationGainM(currentNormCoords).toLocaleString()} m</span>`;
    } else {
      gainEl.innerHTML = `<span style="color:#FC4C02">↑ ${elevationGainM(currentOrigCoords).toLocaleString()} m</span>`;
    }

    const datasets = [
      buildDataset(
        currentOrigCoords, 'Original',
        hasBoth ? '#FC4C0255' : '#FC4C02',
        hasBoth ? '#FC4C020D' : '#FC4C0222',
      ),
    ];
    if (hasBoth) {
      datasets.push(buildDataset(currentNormCoords, 'Normalized', '#2980b9', '#2980b922'));
    }

    if (elevationChart) {
      elevationChart.data.datasets = datasets;
      elevationChart.update('none');
      return;
    }

    const ctx = $('elevation-chart').getContext('2d');
    elevationChart = new Chart(ctx, {
      type: 'line',
      data: { datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        interaction: { mode: 'index', intersect: false },
        scales: {
          x: {
            type: 'linear',
            ticks: {
              callback: v => v.toFixed(0) + ' km',
              maxTicksLimit: 8,
              font: { size: 10 },
              color: '#9a9a9a',
            },
            grid: { color: 'rgba(0,0,0,0.04)' },
          },
          y: {
            ticks: {
              callback: v => v + ' m',
              maxTicksLimit: 4,
              font: { size: 10 },
              color: '#9a9a9a',
            },
            grid: { color: 'rgba(0,0,0,0.04)' },
          },
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: items => items[0].parsed.x.toFixed(2) + ' km',
              label: item => `${item.dataset.label}: ${item.parsed.y.toFixed(0)} m`,
            },
          },
        },
      },
    });
  }

  // ── Layer helpers ────────────────────────────────────────
  function clearAll() {
    if (originalLayer)   { map.removeLayer(originalLayer);   originalLayer = null; }
    if (normalizedLayer) { map.removeLayer(normalizedLayer); normalizedLayer = null; }
    if (elevationChart)  { elevationChart.destroy();         elevationChart = null; }

    normSection.classList.add('hidden');
    statsCard.classList.add('hidden');
    legend.classList.add('hidden');
    emptyState.classList.remove('hidden');
    $('elevation-panel').classList.add('hidden');

    ['toggle-original', 'toggle-normalized'].forEach(id => {
      const el = $(id);
      el.classList.add('active', 'hidden');
      el.setAttribute('aria-pressed', 'true');
    });

    currentSource = null;
    currentOrigCoords = null;
    currentNormCoords = null;
  }

  function showOriginal(coords) {
    if (originalLayer)   { map.removeLayer(originalLayer);   originalLayer = null; }
    if (normalizedLayer) { map.removeLayer(normalizedLayer); normalizedLayer = null; }

    currentOrigCoords = coords;
    currentNormCoords = null;

    originalLayer = L.polyline(coords, {
      color: '#FC4C02', weight: 4, opacity: 0.85,
    }).addTo(map);
    map.fitBounds(originalLayer.getBounds(), { padding: [48, 48] });

    emptyState.classList.add('hidden');
    normSection.classList.remove('hidden');
    statsCard.classList.add('hidden');

    $('toggle-original').classList.remove('hidden');
    $('toggle-normalized').classList.add('hidden');
    legend.classList.remove('hidden');

    refreshElevationChart();
  }

  function showNormalized(origCoords, normalizedCoords, stats) {
    if (originalLayer) {
      originalLayer.setStyle({ weight: 3, opacity: 0.35 });
    }
    if (normalizedLayer) { map.removeLayer(normalizedLayer); normalizedLayer = null; }

    currentNormCoords = normalizedCoords;

    normalizedLayer = L.polyline(normalizedCoords, {
      color: '#2980b9', weight: 4, opacity: 0.9,
    }).addTo(map);
    map.fitBounds(normalizedLayer.getBounds(), { padding: [48, 48] });

    $('stat-original').textContent = stats.original_points.toLocaleString();
    $('stat-clean').textContent    = stats.clean_points.toLocaleString();
    $('stat-detours').textContent  = stats.detours_removed;
    $('stat-removed').textContent  = (stats.original_points - stats.clean_points).toLocaleString();

    statsCard.classList.remove('hidden');
    $('toggle-normalized').classList.remove('hidden');
    $('toggle-normalized').classList.add('active');

    refreshElevationChart();
  }

  // ── API calls ────────────────────────────────────────────
  async function apiFetch(url, opts) {
    const resp = await fetch(url, opts);
    const data = await resp.json().catch(() => ({ error: `HTTP ${resp.status}` }));
    if (!resp.ok) throw new Error(data.error || `Server error ${resp.status}`);
    return data;
  }

  async function fetchByRouteId(routeId) {
    return apiFetch('/api/fetch-gpx/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ route_id: routeId }),
    });
  }

  async function uploadFile(file) {
    const fd = new FormData();
    fd.append('gpx_file', file);
    return apiFetch('/api/upload-gpx/', { method: 'POST', body: fd });
  }

  async function normalizeRoute() {
    if (currentSource.type === 'route_id') {
      return apiFetch('/api/normalize/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ route_id: currentSource.value }),
      });
    } else {
      const fd = new FormData();
      fd.append('gpx_file', currentSource.file);
      return apiFetch('/api/normalize/', { method: 'POST', body: fd });
    }
  }

  // ── Event: Load Route (by ID) ────────────────────────────
  async function handleFetchById() {
    const routeId = routeInput.value.trim();
    if (!routeId || !/^\d+$/.test(routeId)) {
      showError('Please enter a valid numeric route ID.');
      return;
    }
    clearAll();
    clearError();
    setLoading(true, 'Fetching route from Strava…');
    try {
      const data = await fetchByRouteId(routeId);
      currentSource = { type: 'route_id', value: routeId };
      showOriginal(data.coordinates);
    } catch (e) {
      showError(e.message);
    } finally {
      setLoading(false);
    }
  }

  $('btn-fetch').addEventListener('click', handleFetchById);
  routeInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleFetchById(); });

  // ── Event: Load File ─────────────────────────────────────
  async function handleUpload() {
    const file = droppedFile || (fileInput.files.length ? fileInput.files[0] : null);
    if (!file) { showError('Please choose or drop a .gpx file first.'); return; }

    clearAll();
    clearError();
    setLoading(true, 'Parsing GPX file…');
    try {
      const data = await uploadFile(file);
      currentSource = { type: 'file', file };
      showOriginal(data.coordinates);
    } catch (e) {
      showError(e.message);
    } finally {
      setLoading(false);
    }
  }

  $('btn-upload').addEventListener('click', handleUpload);

  // ── Event: Normalize ─────────────────────────────────────
  $('btn-normalize').addEventListener('click', async () => {
    if (!currentSource) return;
    clearError();
    setLoading(true, 'Normalizing route…');
    try {
      const data = await normalizeRoute();
      showNormalized(data.original, data.normalized, data.stats);
    } catch (e) {
      showError(e.message);
    } finally {
      setLoading(false);
    }
  });

  // ── Legend toggles ───────────────────────────────────────
  function bindToggle(id, getLayer, datasetIndex) {
    const el = $(id);
    function doToggle() {
      const isActive = el.classList.toggle('active');
      el.setAttribute('aria-pressed', String(isActive));
      const layer = getLayer();
      if (layer) {
        if (isActive) map.addLayer(layer); else map.removeLayer(layer);
      }
      if (elevationChart && datasetIndex < elevationChart.data.datasets.length) {
        elevationChart.data.datasets[datasetIndex].hidden = !isActive;
        elevationChart.update('none');
      }
    }
    el.addEventListener('click', doToggle);
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); doToggle(); }
    });
  }

  bindToggle('toggle-original',   () => originalLayer,   0);
  bindToggle('toggle-normalized', () => normalizedLayer,  1);

  // ── Tab switching ────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
      $('tab-' + tab).classList.remove('hidden');
    });
  });

  // ── File input / drag-and-drop ───────────────────────────
  function setChosenFile(file) {
    if (!file) return;
    droppedFile = file;
    chosenName.textContent = file.name;
  }

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') fileInput.click(); });

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.name.toLowerCase().endsWith('.gpx')) {
      setChosenFile(file);
    } else {
      showError('Please drop a .gpx file.');
    }
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) {
      droppedFile = null;
      chosenName.textContent = fileInput.files[0].name;
    }
  });

})();
</script>
</body>
</html>
